name: Release Build

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    container:
      image: debian:bookworm
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get -y upgrade
          apt-get install -y gcc git make pkg-config libxext-dev xserver-xorg-dev

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git safe directory
        run: git config --global --add safe.directory $(pwd)

      - name: Import Public Key
        run: |
          printf '%s\n' "$GPG_PUBLIC_KEY" | gpg --import
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}

      - name: Verify Signature
        run: |
          if ! git verify-tag -- "$TAG_NAME"; then
            echo "Error: Tag is not signed or signature is invalid."
            exit 1
          fi
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Build tarball
        run: make tarball

      - name: Store release version
        id: version
        run: |
          version="$(git describe --tags)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload Tarball as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: ./xext-rexsec-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download Tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$TAG_NAME" "./xext-rexsec-$VERSION.tar.gz" \
            --title "Release $TAG_NAME" \
            --generate-notes
